<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chez — Roblox Scripting Portfolio</title>
<meta name="theme-color" content="#0a0d13">
<meta name="description" content="Chez is a Roblox systems scripter focused on maintainable Luau architecture and clean interfaces.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0a0d13;
    --panel: #10141d;
    --panel-2: #151a25;
    --line: #232a38;
    --text: #e7e9ee;
    --text-dim: #8993a6;
    --amber: #e8a94c;
    --amber-dim: #b8853b;
    --teal: #52d1c4;
    --danger: #e0645a;
    --green: #52d18a;
    --radius: 10px;
    --mono: 'JetBrains Mono', monospace;
    --display: 'Space Grotesk', sans-serif;
    --body: 'Inter', sans-serif;
  }
  *{ box-sizing: border-box; margin:0; padding:0; }
  html{ scroll-behavior: smooth; }
  body{
    background: var(--bg);
    color: var(--text);
    font-family: var(--body);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  body::before{
    content:"";
    position: fixed; inset: 0;
    background-image:
      radial-gradient(circle at 15% 10%, rgba(232,169,76,0.06), transparent 40%),
      radial-gradient(circle at 85% 30%, rgba(82,209,196,0.05), transparent 45%);
    pointer-events: none;
    z-index: 0;
  }
  a{ color: inherit; text-decoration: none; }
  ::selection{ background: var(--amber); color: #0a0d13; }
  .lines{
    position: relative;
    padding-left: 56px;
  }
  .lines::before{
    content: "";
    position: absolute;
    left: 30px; top: 0; bottom: 0;
    width: 1px;
    background: var(--line);
  }

  /* ---------- NAV ---------- */
  header{
    position: sticky; top:0; z-index: 100;
    background: rgba(10,13,19,0.85);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
  }
  .nav-wrap{
    max-width: 1100px; margin: 0 auto;
    padding: 16px 32px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 24px;
  }
  .brand{
    font-family: var(--mono); font-size: 14px; color: var(--text-dim);
    display: flex; align-items: center; gap: 8px;
  }
  .brand .dot{ width:8px; height:8px; border-radius:50%; background: var(--amber); box-shadow: 0 0 8px var(--amber); animation: blink 2.2s infinite; }
  @keyframes blink{ 0%,100%{opacity:1} 50%{opacity:.35} }
  nav ul{ list-style:none; display:flex; gap: 28px; }
  nav a{
    font-family: var(--mono); font-size: 13px; color: var(--text-dim);
    letter-spacing: 0.02em; transition: color .2s;
    position: relative;
  }
  nav a:hover, nav a.active{ color: var(--amber); }
  nav a::before{ content: "· "; color: var(--amber); opacity:0; transition: opacity .2s; }
  nav a:hover::before, nav a.active::before{ opacity:1; }
  .nav-toggle{ display:none; background:none; border:none; color:var(--text); font-size:22px; cursor:pointer; }

  @media (max-width: 720px){
    nav ul{
      position: absolute; top: 100%; left:0; right:0;
      background: var(--panel); border-bottom: 1px solid var(--line);
      flex-direction: column; padding: 16px 32px; gap: 16px;
      display: none;
    }
    nav ul.open{ display:flex; }
    .nav-toggle{ display:block; }
  }

  section{ position: relative; z-index:1; max-width: 1100px; margin: 0 auto; padding: 100px 32px; }
  h1,h2,h3{ font-family: var(--display); font-weight: 600; letter-spacing: -0.01em; }
  h2{ font-size: 30px; margin-bottom: 8px; }
  .section-sub{ color: var(--text-dim); font-size: 15px; margin-bottom: 44px; max-width: 560px; }

  /* ---------- HERO ---------- */
  #home{ padding-top: 80px; padding-bottom: 60px; }
  .hero-grid{
    display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 56px; align-items: start;
  }
  @media (max-width: 900px){ .hero-grid{ grid-template-columns: 1fr; } }
  .status-pill{
    display:inline-flex; align-items:center; gap:8px;
    font-family: var(--mono); font-size: 11px; letter-spacing:0.08em;
    color: #7bdcc4; background: rgba(82,209,196,0.08); border: 1px solid rgba(82,209,196,0.3);
    padding: 6px 12px; border-radius: 100px; margin-bottom: 26px;
  }
  .status-pill .dot{ width:6px;height:6px;border-radius:50%; background:#52d1c4; }
  h1.title{ font-size: clamp(34px, 5vw, 52px); line-height: 1.12; margin-bottom: 22px; }
  h1.title .hl{ color: var(--amber); }
  .lede{ color: var(--text-dim); font-size: 17px; max-width: 480px; margin-bottom: 34px; }
  .cta-row{ display:flex; gap: 14px; flex-wrap: wrap; }
  .btn{
    font-family: var(--mono); font-size: 13px; padding: 13px 22px; border-radius: 8px;
    border: 1px solid var(--line); transition: all .2s;
    display:inline-flex; align-items:center; gap:8px;
  }
  .btn-primary{ background: var(--amber); color: #0a0d13; border-color: var(--amber); font-weight: 600; }
  .btn-primary:hover{ background: #f2ba66; }
  .btn-ghost:hover{ border-color: var(--amber); color: var(--amber); }

  .code-panel{
    background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
    overflow: hidden; box-shadow: 0 30px 60px -20px rgba(0,0,0,0.5);
  }
  .code-tabbar{
    display:flex; align-items:center; gap: 8px;
    padding: 10px 14px; background: var(--panel-2); border-bottom: 1px solid var(--line);
  }
  .code-tabbar .tab{
    font-family: var(--mono); font-size: 12px; color: var(--text-dim);
    padding: 4px 10px; border-radius: 6px;
  }
  .code-tabbar .tab.active{ background: var(--bg); color: var(--amber); }
  .code-dots{ display:flex; gap:6px; margin-right: 6px; }
  .code-dots span{ width:9px; height:9px; border-radius:50%; background: var(--line); }
  pre.code{
    font-family: var(--mono); font-size: 12.5px; padding: 20px 18px; overflow-x:auto;
    color: #c7cede;
  }
  pre.code .k{ color: #e8a94c; }
  pre.code .s{ color: #7bdcc4; }
  pre.code .c{ color: #5b6577; font-style: italic; }
  pre.code .p{ color: #8f9bb3; }
  pre.code .n{ color: #d99cf0; }

  /* ---------- PROJECTS ---------- */
  .project-card{
    background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 30px; margin-bottom: 22px;
    display: grid; grid-template-columns: auto 1fr auto; gap: 26px; align-items: start;
    transition: border-color .2s;
  }
  .project-card:hover{ border-color: #33405a; }
  @media (max-width: 800px){ .project-card{ grid-template-columns: 1fr; } .project-media{ order: -1; width: 100% !important; height: 180px !important; } }
  .project-index{
    font-family: var(--mono); font-size: 13px; color: var(--text-dim);
    writing-mode: horizontal-tb;
  }
  .project-media{
    width: 220px; height: 140px; border-radius: 8px; overflow: hidden;
    background: var(--panel-2); border: 1px dashed var(--line);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .project-media img{ width: 100%; height: 100%; object-fit: cover; display: block; }
  .project-media .media-placeholder{
    font-family: var(--mono); font-size: 11.5px; color: var(--text-dim);
    text-align: center; padding: 0 16px; line-height: 1.5;
  }
  .project-tags{ display:flex; gap:8px; flex-wrap:wrap; margin: 14px 0 16px; }
  .tag{
    font-family: var(--mono); font-size: 11px; color: var(--teal);
    background: rgba(82,209,196,0.08); border: 1px solid rgba(82,209,196,0.25);
    padding: 4px 10px; border-radius: 100px;
  }
  .project-card h3{ font-size: 20px; margin-bottom: 4px; }
  .project-role{ font-family: var(--mono); font-size: 12px; color: var(--amber); margin-bottom: 14px; display:block; }
  .project-card p{ color: var(--text-dim); font-size: 14.5px; max-width: 620px; }
  .project-card.placeholder{
    border-style: dashed; display:flex; align-items:center; justify-content:center;
    min-height: 120px; color: var(--text-dim); font-family: var(--mono); font-size: 13px;
    text-align: center;
  }

  /* ---------- SYSTEMS SHOWCASE ---------- */
  .showcase-card{
    background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 30px; margin-bottom: 24px;
    display: grid; grid-template-columns: 1fr 1.05fr; gap: 32px; align-items: start;
  }
  @media (max-width: 850px){ .showcase-card{ grid-template-columns: 1fr; } }
  .showcase-media{
    position: relative; width: 100%; aspect-ratio: 16 / 9; border-radius: 8px;
    background: var(--panel-2); border: 1px dashed var(--line);
    display: flex; align-items: center; justify-content: center; overflow: hidden;
  }
  .showcase-media video{ width:100%; height:100%; object-fit: cover; display:block; }
  .showcase-media .media-placeholder{
    font-family: var(--mono); font-size: 12px; color: var(--text-dim); text-align:center; padding: 0 20px;
  }
  .showcase-media .play-ring{
    width: 46px; height: 46px; border-radius: 50%; border: 1px solid var(--line);
    display:flex; align-items:center; justify-content:center; margin: 0 auto 12px;
    color: var(--amber); font-size: 14px;
  }
  .showcase-role{ font-family: var(--mono); font-size: 12px; color: var(--amber); display:block; margin-bottom: 6px; }
  .showcase-card h3{ font-size: 19px; margin-bottom: 10px; }
  .showcase-tags{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom: 14px; }
  .showcase-card > div > p.showcase-desc{ color: var(--text-dim); font-size: 14px; margin-bottom: 18px; }
  .mini-code-panel{
    background: #0d1017; border: 1px solid var(--line); border-radius: 8px; overflow: hidden;
  }
  .mini-code-tabbar{
    display:flex; align-items:center; justify-content:space-between;
    padding: 8px 12px; background: var(--panel-2); border-bottom: 1px solid var(--line);
    font-family: var(--mono); font-size: 11.5px; color: var(--text-dim);
  }
  .code-toggle{
    background:none; border: none; color: var(--teal); font-family: var(--mono);
    font-size: 11px; cursor: pointer; display:flex; align-items:center; gap:4px;
  }
  .mini-code-body{
    max-height: 130px; overflow: hidden; position: relative;
    transition: max-height .35s ease;
  }
  .mini-code-body::after{
    content:""; position:absolute; left:0; right:0; bottom:0; height:40px;
    background: linear-gradient(to bottom, transparent, #0d1017);
    transition: opacity .2s;
  }
  .mini-code-body.expanded{ max-height: 900px; }
  .mini-code-body.expanded::after{ opacity: 0; }
  .mini-code-body pre.code{ padding: 16px; font-size: 12px; }

  /* ---------- SYSTEMS GRID ---------- */
  .systems-grid{ display:grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  @media (max-width: 800px){ .systems-grid{ grid-template-columns: 1fr; } }
  .system-card{
    background: var(--panel-2); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 24px;
  }
  .system-card .icon{ font-size: 20px; margin-bottom: 14px; color: var(--amber); }
  .system-card h3{ font-size: 16px; margin-bottom: 8px; }
  .system-card p{ color: var(--text-dim); font-size: 13.5px; }

  /* ---------- TECH STACK ---------- */
  .stack-groups{ display:grid; grid-template-columns: repeat(2, 1fr); gap: 30px; }
  @media (max-width: 700px){ .stack-groups{ grid-template-columns: 1fr; } }
  .stack-group h3{
    font-family: var(--mono); font-size: 12px; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 16px;
  }
  .stack-chips{ display:flex; flex-direction:column; gap:10px; }
  .tech-item{
    background: #0a0d13; border: 1px solid var(--line); border-radius: 8px;
    padding: 13px 16px; display:flex; align-items:center; gap:12px;
  }
  .tech-item .t-icon{
    width: 42px; 
    height:42px; 
    border-radius:8px; 
    background: transparent;
    display:flex; align-items:center; justify-content:center; 
    color: var(--amber); flex-shrink:0;
  }
  .tech-item .t-icon svg{ width:22px; height:22px; }
  .tech-item .t-icon img{ width:22px; height:22px; object-fit:contain; }
  .tech-item .t-name{ font-family: var(--mono); font-size: 13px; color: var(--text); }
  .t-icon.coin{
    border-radius: 50%;
    background: linear-gradient(145deg, #2c3346, #12161f);
    border: 1px solid var(--amber-dim);
    font-family: var(--mono); font-weight:700; font-size: 10.5px; color: var(--amber);
  }
  .t-icon.brand{ border-radius: 8px; color: #fff; }
  .t-icon.brand-github{ background: #181717; }
  .t-icon.brand-studio{ background: linear-gradient(145deg, #2a86e8, #1550ad); }
  .t-icon.brand-luau{ background: linear-gradient(145deg, #00a2ff, #0064c8); }
  .t-icon.brand-modulescripts{ background: linear-gradient(145deg, #3a4256, #232a38); }
  .t-icon.brand-robux{ border-radius: 50%; background: radial-gradient(circle at 35% 30%, #00c26b, #009150); }

  /* ---------- CONTACT ---------- */
  .contact-meta-line{
    font-family: var(--mono); font-size: 12.5px; color: var(--text-dim); margin-bottom: 36px;
    margin-top: -24px;
  }
  .contact-meta-line span{ color: var(--amber); }
  .contact-panel{
    background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 44px; display:grid; grid-template-columns: 1.2fr 1fr; gap: 40px;
  }
  @media (max-width: 750px){ .contact-panel{ grid-template-columns: 1fr; } }
  .contact-panel h2{ margin-bottom: 14px; }
  .status-badge{
    font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.06em;
    color: var(--green); background: rgba(82,209,138,0.1); border: 1px solid rgba(82,209,138,0.3);
    padding: 3px 9px; border-radius: 100px; text-transform: uppercase;
    display:inline-flex; align-items:center; gap:5px;
  }
  .status-badge::before{ content:""; width:5px; height:5px; border-radius:50%; background: var(--green); }
  .discord-btn{
    display:flex; align-items:center; justify-content:space-between; gap: 12px;
    background: #0a0d13; border: 1px solid var(--line); border-radius: 8px;
    padding: 16px 20px; margin-top: 18px; transition: border-color .2s;
  }
  .discord-btn:hover{ border-color: var(--teal); }
  .discord-btn .d-left{ display:flex; align-items:center; gap:12px; }
  .discord-btn .d-icon{
    width: 36px; height:36px; border-radius:8px; background: #5865F2;
    display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0;
  }
  .discord-btn .d-text .label{ font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
  .discord-btn .d-text .handle{ font-family: var(--mono); font-size: 14px; color: var(--text); }
  .meta-list{ display:flex; flex-direction:column; gap: 14px; }
  .meta-card{
    background: #0a0d13; border: 1px solid var(--line); border-radius: 8px;
    padding: 16px 18px; display:flex; align-items:center; justify-content:space-between; gap:12px;
  }
  .meta-card .m-left{ display:flex; align-items:center; gap: 12px; }
  .meta-card .m-icon{
    width: 42px; 
    height:42px; 
    border-radius:8px; 
    background: transparent;
    display:flex; align-items:center; justify-content:center; 
    font-size:14px; flex-shrink:0;
    color: var(--amber); font-family: var(--mono); font-weight:600;
  }
  .meta-card .m-label{ font-family: var(--mono); font-size: 10.5px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; }
  .meta-card .m-value{ font-family: var(--mono); font-size: 13px; color: var(--text); margin-top: 2px; }
  .m-icon.coin{
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #00c26b, #009150);
    border: none;
  }
  .m-icon img{ width:22px; height:22px; object-fit:contain; }

  footer{
    text-align:center; padding: 40px 32px; color: var(--text-dim);
    font-family: var(--mono); font-size: 12px; border-top: 1px solid var(--line);
  }

  .reveal{ opacity:0; transform: translateY(16px); transition: opacity .6s ease, transform .6s ease; }
  .reveal.in{ opacity:1; transform: translateY(0); }
</style>
</head>
<body>
